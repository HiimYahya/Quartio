version: "3.9"

services:

  # ── Frontend utilisateur ────────────────────────────────────────────────────
  frontoffice:
    build:
      context: ./Frontoffice
      args:
        VITE_API_URL: http://localhost:3000/api
    container_name: quartio_frontoffice
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

  # ── API Backend ─────────────────────────────────────────────────────────────
  api:
    build: ./Backend
    container_name: quartio_api
    ports:
      - "3000:3000"
    env_file:
      - ./Backend/.env
    environment:
      - DB_HOST=db
      - MONGO_URI=mongodb://mongo:27017/pa_db
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: quartio_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pa_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./Backend/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: quartio_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Neo4j ────────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: quartio_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  mongo_data:
  neo4j_data:
